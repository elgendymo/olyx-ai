# Dark theme — Briefy-ish calm palette. Look/feel where it matters; no component library.
[theme]
base = "dark"
primaryColor = "#22d3ee"
backgroundColor = "#0a0b0e"
secondaryBackgroundColor = "#111214"
textColor = "#e7e9ee"
font = "sans serif"           # sans for body/headers; mono reserved for labels + numbers (via CSS)

[server]
headless = true

[browser]
gatherUsageStats = false
